<header class="bg-gray-950 border-b border-gray-800 shadow-lg sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <!-- Logo -->
      <a routerLink="/" class="logo-link group flex items-center gap-1 select-none">
        <span class="text-white text-2xl font-bold tracking-widest uppercase transition-colors duration-200 group-hover:text-orange-400">
          Gear
        </span>
        <span class="text-orange-500 text-2xl font-bold tracking-widest uppercase transition-colors duration-200 group-hover:text-orange-300">
          Box
        </span>
      </a>

      <!-- Nav links -->
      <nav class="flex items-center">
        @for (link of navLinks; track link.path) {
          <a
            [routerLink]="link.path"
            routerLinkActive="active-link"
            class="nav-link"
          >
            {{ link.label }}
          </a>
        }
      </nav>

    </div>
  </div>
</header>
